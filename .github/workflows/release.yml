name: Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 等标签时触发

permissions:
  contents: write # 允许创建 Release 并上传文件

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tailwind CSS dependencies
        run: npm install

      - name: Build CSS
        run: npm run build:css

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI (dx)
        run: cargo binstall dioxus-cli --force --locked -y

      - name: Build and Bundle (Release)
        working-directory: ./packages/desktop
        run: dx bundle --release

      - name: Get Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        shell: bash

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            packages/desktop/target/dx/Isle/release/bundle/msi/*.msi
            packages/desktop/target/dx/Isle/release/bundle/exe/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
