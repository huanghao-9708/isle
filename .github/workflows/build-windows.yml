name: Build Windows Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI (dx)
        run: cargo binstall dioxus-cli --force --locked -y

      - name: Build and Bundle (Release)
        working-directory: ./packages/desktop
        run: dx bundle --release --package-types msi exe

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            target/dx/**/bundle/windows/msi/*.msi
            target/dx/**/bundle/windows/exe/*.exe
          if-no-files-found: warn