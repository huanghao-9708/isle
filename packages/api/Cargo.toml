[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true }
rusqlite = { version = "0.31", features = ["bundled"] }
walkdir = "2"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
sha2 = "0.10"
rand = "0.8"
uuid = { version = "1", features = ["v4"] }
tracing = { workspace = true }
rodio = { version = "0.20", features = ["symphonia-all"] }
lofty = "0.21"
rfd = "0.15"

[dev-dependencies]
tempfile = "3"
